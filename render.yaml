services:
  - type: web
    name: usman-ai-studio
    runtime: node
    plan: free
    branch: usman-ai-studio-deploy
    buildCommand: cat .ai_archive/part-*.b64 | base64 -d > /tmp/ai-studio-project.tar.gz && tar -xzf /tmp/ai-studio-project.tar.gz && npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: APP_NAME
        value: Usman AI Studio
      - key: APP_TAGLINE
        value: Chat, create, edit and work with files
      - key: MAX_FILE_MB
        value: "25"
      - key: MAX_FILES
        value: "8"
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: ENABLE_MODERATION
        value: "true"
